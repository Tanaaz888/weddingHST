<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="invite-page">

  <div class="invite-hero">
    <h1 id="guest-name">Welcome</h1> 
   <p class="invite-sub">Here are your wedding details</p>
  <p class="invite-sub invite-photos"><a href="YOUR_GOOGLE_DRIVE_LINK" target="_blank">📷 Do add your photos here!</a></p> <!-- add in google drive -->
  </div>

  <div class="invite-content">

    <div class="card">
      <h2 class="card-title">Accommodation</h2> 
      <div class="info-row">
        <span class="info-label">Hotel</span> 
        <span id="hotel" class="info-value"></span>
      </div>
      <div class="info-row">
        <span class="info-label">Room</span>  
        <span id="room" class="info-value"></span>
      </div>
    </div>
   
    <div class="card" id="party-card">
        <h2 class="card-title" style="margin-top: 14px;">Your Party</h2>
        <ul id="party-list" class="party-list"></ul>
    </div>


    <div id="events-section">
      
      <div id="events-list"></div>
    </div>
    <div class="card info-banner">
      <h2 class="card-title">Additional Information</h2> 
      <p class="info-banner-text">Your additional info here</p>
    </div>

    <div class="back-btn-wrap">
      <a href="index.html" class="back-btn">← Back to search</a>
    </div>
    
  </div>

  <script>
    const EVENTS = [
      {
        key: "mehndi",
        label: "Mehndi",  // text that appears
        date: "Friday, 26 February 2026",  // text that appears
        time: "12:00 PM – 6:00 PM",  // text that appears
        location: "Harmony",  // text that appears
        outfit: "Casual",  // text that appears
        color: "rgba(180, 140, 80, 0.6)" 
        // image: "url('YOUR_MEHNDI_BANNER_URL')"
      },
      {
        key: "haldi",
        label: "Haldi",  // text that appears
        date: "Saturday, 27 February 2026",  // text that appears
        time: "1:00 PM – 4:00 PM",  // text that appears
        location: "Swimming Pool, Golden Fields Resort",  // text that appears
        outfit: "Pastels, Light clothing!",  // text that appears
        color: "rgba(210, 160, 60, 0.6)"
        // image: "url('YOUR_HALDI_BANNER_URL')"
      },
      {
        key: "sangeet",
        label: "Sangeet",  // text that appears
        date: "Saturday, 27 February 2026",  // text that appears
        time: "7:00 PM – 11:00 PM",  // text that appears
        location: "Lawn, Golden Fields Resort",  // text that appears
        outfit: "Fun — bright colours welcome",  // text that appears
        color: "rgba(140, 70, 110, 0.6)"
        // image: "url('YOUR_SANGEET_BANNER_URL')"
      },
      {
        key: "vidhi",
        label: "Vidhi",  // text that appears
        date: "Sunday, 28 February 2026",  // text that appears
        time: "9:00 AM – 12:00 PM",  // text that appears
        location: "Lawn, Golden Fields Resort",  // text that appears
        outfit: "Traditional formal - Greens, Golds, Pinks, Whites",  // text that appears
        color: "rgba(100, 140, 100, 0.6)"
        // image: "url('YOUR_VIDHI_BANNER_URL')"
      },
      {
        key: "tea_ceremony",
        label: "Tea Ceremony",  // text that appears
        date: "Sunday, 28 February 2026",  // text that appears
        time: "4:00 PM – 5:00 PM",  // text that appears
        location: "Pavillion, Golden Fields Resort",  // text that appears
        outfit: "Up to you",  // text that appears
        color: "rgba(180, 100, 70, 0.6)"
        // image: "url('YOUR_TEA_BANNER_URL')"
      },
      {
        key: "afterparty",
        label: "Afterparty",  // text that appears
        date: "Sunday, 28 February 2026",  // text that appears
        time: "7:00 PM – 12.00 AM",  // text that appears
        location: "Pavillion, Golden Fields Resort",  // text that appears
        outfit: "Casual",  // text that appears
        color: "rgba(50, 50, 65, 0.6)"
        // image: "url('YOUR_AFTERPARTY_BANNER_URL')"
      }
    ];

    const raw = sessionStorage.getItem("guestData");
    if (!raw) { window.location.href = "index.html"; }
    const guest = JSON.parse(raw);

    document.getElementById("guest-name").textContent = `Welcome, ${guest.name}`;
    // Check if vidhi-only guest
    const events = ["mehndi","haldi","sangeet","vidhi","tea_ceremony","afterparty"];
    const invitedEvents = events.filter(ev => (guest[ev] || "").toString().toUpperCase() === "YES");
    const vidhiOnly = invitedEvents.length === 1 && invitedEvents[0] === "vidhi";

if (vidhiOnly) {
  document.querySelector(".card").style.display = "none"; // hides accommodation card
} else {
  document.getElementById("hotel").textContent = guest.hotel;
  document.getElementById("room").textContent = guest.room;
}

    // Party members
    const partyCard = document.getElementById("party-card");
    const partyList = document.getElementById("party-list");
    if (guest.party && guest.party.length > 0) {
      guest.party.forEach(member => {
        const li = document.createElement("li");
        li.textContent = member;
        partyList.appendChild(li);
      });
    } else {
      partyCard.style.display = "none";
    } 

    // Event banners
    const eventsList = document.getElementById("events-list");
    EVENTS.forEach(ev => {
      if ((guest[ev.key] || "").toString().toUpperCase() === "YES") {
        const banner = document.createElement("div");
        banner.className = "event-banner";

        // When you have an image, comment out the line below and uncomment the one after
        banner.style.background = ev.color;
        // banner.style.background = ev.image + ", " + ev.color;
        banner.style.backgroundSize = "cover";
        banner.style.backgroundPosition = "center";

        banner.innerHTML = `
          <div class="banner-overlay">
            <h3 class="banner-title">${ev.label}</h3>
            <div class="banner-details">
              <p>📅 ${ev.date}</p>
              <p>🕐 ${ev.time}</p>
              <p>📍 ${ev.location}</p>
              <p>👗 ${ev.outfit}</p>
            </div>
          </div>
        `;
        eventsList.appendChild(banner);
      }
    });
  </script>
</body>
</html>
